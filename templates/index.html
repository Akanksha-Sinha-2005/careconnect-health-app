<!DOCTYPE html>
<html>
<head>
<title>CareConnect</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<div class="card shadow p-4">
<h2 class="text-center mb-4">&#128153 CareConnect Healthcare Support</h2>
<form method="POST">
<input class="form-control mb-3" type="text" name="name" placeholder="Enter Name" required>
<input email="form-control mb-3" type="email" name="email" placeholder="Enter Email" required>
<select class="form-control mb-3" name="type">
    <option>Patient</option>
    <option>Volunteer</option>
</select>
<textarea class="form-control mb-3" name="message" placeholder="Describe your issue..." required></textarea>
<button class="btn btn-primary w-100">Submit</button>
</form>
{% if response %}
<div class="alert alert-success mt-4">
<strong>&#129302 AI Response</strong>
{{response}}
</div>
{% endif %}
</div>
</div>
</body>
</html>
